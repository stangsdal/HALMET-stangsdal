; PlatformIO Project Configuration File
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

[platformio]
default_envs = stangsdal

[project]
version = 0.9.0

[env]

upload_speed = 2000000
monitor_speed = 115200

lib_deps =
    SignalK/SensESP @ ^3.1.0
    adafruit/Adafruit SSD1306 @ ^2.5.1
    ttlappalainen/NMEA2000-library@^4.17.2
    NMEA2000_twai=https://github.com/skarlsson/NMEA2000_twai
    ESP32SPISlave=https://github.com/hideakitai/ESP32SPISlave
    adafruit/Adafruit ADS1X15@^2.3.0
    HALMET_ClipperDuet=https://github.com/stangsdal/HALMET-ClipperDuet.git#v0.1.1
    sensesp_ds1603l_sensor=https://github.com/stangsdal/sensesp-ds1603l-sensor.git

build_flags =
    ; Max (and default) debugging level in Arduino ESP32 Core
    -D CORE_DEBUG_LEVEL=ARDUHAL_LOG_LEVEL_VERBOSE
    ; Project-level firmware version, sourced from [project].
    -D PROJECT_VERSION='"${project.version}"'
    ; Use the ESP-IDF logging library - required by SensESP.
    -D USE_ESP_IDF_LOG
    ; Enable Clipper input feature path (Signal K + NMEA 2000, no NMEA 0183).
    ; -D ENABLE_CLIPPER_INPUT

board_build.partitions = min_spiffs.csv

;; Uncomment the following lines to use Over-the-air (OTA) Updates
upload_protocol = espota
upload_port = boatmeter.stangsdal.dk
upload_flags =
  --auth=red_deer

; You shouldn't need to touch the settings in this section below this line.

build_unflags =
    -Werror=reorder
monitor_filters = esp32_exception_decoder

test_build_src = true
check_tool = clangtidy
check_flags =
    clangtidy: --fix --format-style=file --config-file=.clang-tidy

;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;
; Platform configurations follow

[arduino]

platform = espressif32 @ ^6.9.0
framework = arduino

lib_ignore =
    esp_websocket_client

build_flags =
    ${env.build_flags}
    ; Arduino Core bug workaround: define the log tag for the Arduino
    ; logging macros.
    -D TAG='"Arduino"'

[pioarduino]

# Required until these issues are resolved:
# - https://github.com/espressif/arduino-esp32/issues/11228
# - https://github.com/espressif/esp-idf/issues/15734
platform = https://github.com/pioarduino/platform-espressif32/releases/download/53.03.13/platform-espressif32.zip
framework = arduino

; The library.json format doesn't support dependencies conditional on the
; platform version, so we have to use the lib_deps option to specify the
; esp_websocket_client library only for the ESP-IDF framework.

lib_deps =
    ${env.lib_deps}
    esp_websocket_client=https://components.espressif.com/api/downloads/?object_type=component&object_id=b072eea5-4e65-4ced-94c3-d6f24207062d

build_flags =
    ${env.build_flags}
    ; Enable SSL/TLS support for Signal K server connections
    -D SENSESP_SSL_SUPPORT=1

[espidf]

platform = https://github.com/pioarduino/platform-espressif32/releases/download/stable/platform-espressif32.zip
framework = espidf, arduino

board_build.embed_txtfiles =
    managed_components/espressif__esp_insights/server_certs/https_server.crt
    managed_components/espressif__esp_rainmaker/server_certs/rmaker_mqtt_server.crt
    managed_components/espressif__esp_rainmaker/server_certs/rmaker_claim_service_server.crt
    managed_components/espressif__esp_rainmaker/server_certs/rmaker_ota_server.crt

; The library.json format doesn't support dependencies conditional on the
; platform version, so we have to use the lib_deps option to specify the
; esp_websocket_client library only for the ESP-IDF framework.

lib_deps =
    ${env.lib_deps}
    esp_websocket_client=https://components.espressif.com/api/downloads/?object_type=component&object_id=dbc87006-9a4b-45e6-a6ab-b286174cb413

build_flags =
    ${env.build_flags}
    ; Enable SSL/TLS support for Signal K server connections
    -D SENSESP_SSL_SUPPORT=1

;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;
; Board configurations follow

[esp32]

board = esp32dev
build_flags =
    ${env.build_flags}
    -D BUTTON_BUILTIN=0
    -D LED_BUILTIN=2

;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;
; Permutations of platform and device.

[env:arduino_esp32]

extends = arduino, esp32
build_flags =
    ${arduino.build_flags}
    ${esp32.build_flags}

[env:pioarduino_esp32]

extends = pioarduino, esp32
build_flags =
    ${pioarduino.build_flags}
    ${esp32.build_flags}

[env:espidf_esp32]

extends = espidf, esp32
build_flags =
    ${espidf.build_flags}
    ${esp32.build_flags}

;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;
; Individual board configurations

[env:stangsdal]

extends = pioarduino, esp32
board_build.partitions = default_8MB.csv

build_flags =
    ${pioarduino.build_flags}
    ${esp32.build_flags}

[env:stangsdal_clipper]

extends = pioarduino, esp32
board_build.partitions = default_8MB.csv

build_flags =
    ${pioarduino.build_flags}
    ${esp32.build_flags}
    -D ENABLE_CLIPPER_INPUT
    ; Optional tuning/logging for Clipper decode path:
    ; -D CLIPPER_DATA_TIMEOUT_MS=5000
    ; -D CLIPPER_MIN_VALID_FRAMES=3
    ; -D CLIPPER_DEBUG
